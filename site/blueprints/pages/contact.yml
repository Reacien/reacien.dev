title: Contact
icon: email

options:
  changeStatus: false
  delete: false
  duplicate: false
  changeSlug: false
  changeTemplate: false

tabs:
  content:
    label: Content
    icon: text
    columns:
      main:
        width: 2/3
        sections:
          hero:
            type: fields
            label: Hero
            fields:
              subtitle:
                type: text
                label: Subtitle
                help: "Short tagline shown under the H1."
              intro:
                type: textarea
                label: Intro
                size: small
                help: "A welcoming paragraph above the contact methods."
          body:
            type: fields
            label: Body
            fields:
              description:
                type: textarea
                label: Body Copy
                size: large
                help: "Optional longer text — supports KirbyText."

      sidebar:
        width: 1/3
        sections:
          status:
            type: fields
            label: Status
            fields:
              response_time:
                type: text
                label: Response Time
                help: 'Shown in the green "responding · avg Xh" pill on the contact page. Leave blank to hide.'
                placeholder: "avg 18h"
          channels:
            type: fields
            label: Contact Channels
            fields:
              email_to:
                type: email
                label: Primary Email
                help: "Where the contact form sends to. Used for the mailto link."
              email_note:
                type: text
                label: Email Note
                placeholder: "for anything that needs attachments, context, or privacy"
              email_badge:
                type: text
                label: Email Badge
                placeholder: "best for most things"
                help: "Optional little pill shown on the email card."
              github_note:
                type: text
                label: GitHub Note
                placeholder: "issues, PRs, and bug reports that belong in a tracker"
              twitter_note:
                type: text
                label: Twitter / X Note
                placeholder: "quick chatter, replies within a day or so"
              kofi_note:
                type: text
                label: Ko-fi Note
                placeholder: "tip jar — fuels the americano habit"
              not_me_disclaimer:
                type: textarea
                label: "Not Me" Disclaimer
                size: small
                buttons: false
                help: "Optional little footnote about accounts that aren't actually you."
                placeholder: "any account that isn't listed here isn't mine — even if it looks close."

  seo:
    extends: tabs/seo
