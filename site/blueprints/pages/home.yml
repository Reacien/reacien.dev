title: Home
icon: home

options:
  changeStatus: false
  delete: false
  duplicate: false
  changeSlug: false
  changeTemplate: false

tabs:
  content:
    label: Content
    icon: text
    columns:
      main:
        width: 2/3
        sections:
          hero:
            type: fields
            label: Hero
            fields:
              hero_heading:
                type: writer
                label: Hero Heading
                inline: true
                marks:
                  - italic
                help: "Wrap a word in italic (Cmd/Ctrl+I) to highlight it in the accent color."
                default: "building on the <em>web</em>, one commit at a time."
              hero_lede:
                type: textarea
                label: Hero Lede
                size: small
                buttons: false

          selected_work:
            type: fields
            label: Selected Work
            fields:
              selected_work_heading:
                type: writer
                label: Section Heading
                inline: true
                marks:
                  - italic
                default: "Recent <em>projects</em>"
              selected_work_limit:
                type: number
                label: Number of Projects to Show
                default: 4
                min: 1
                max: 12

      sidebar:
        width: 1/3
        sections:
          site_key:
            type: fields
            label: Site Key Card
            fields:
              site_key_title:
                type: writer
                label: Title
                inline: true
                marks:
                  - italic
                default: "hi, i'm <em>reacien</em>."
              site_key_intro:
                type: textarea
                label: Intro
                size: small
                buttons: false
                default: "dutch web developer — shipping practical tools, clean uis, and a little bit of automation in the seams."

  seo:
    extends: tabs/seo
