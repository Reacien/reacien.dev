title: Project
icon: image

status:
  draft:
    label: Draft
    text: Not visible on the site.
  unlisted:
    label: Unlisted
    text: Accessible by URL but not listed.
  listed:
    label: Published
    text: Visible in the projects listing.

tabs:
  content:
    label: Content
    icon: text
    columns:
      main:
        width: 2/3
        sections:
          hero:
            type: fields
            label: Project Overview
            fields:
              subtitle:
                type: text
                label: Subtitle
                help: "Short one-line summary shown under the title."
              project_status:
                type: select
                label: Project Status
                width: 1/3
                default: wip
                options:
                  wip: In Progress
                  completed: Completed
                  archived: Archived
                  idea: Idea
              year:
                type: text
                label: Year
                width: 1/3
                help: "Optional — shown in the meta row."
              scope:
                type: text
                label: Scope
                width: 1/3
                help: 'Optional — short note like "3wk · solo" or "8wk · 2 devs".'
              category:
                type: select
                label: Category
                width: 1/2
                help: "Used by the filter chips on the projects index."
                options:
                  web: Web
                  tools: Tools
                  experiments: Experiments
                  automation: Automation
                  library: Library
                  other: Other
              tech:
                type: tags
                label: Tech
                width: 1/2
                options:
                  - php
                  - javascript
                  - typescript
                  - python
                  - css
                  - html
                  - kirby
                  - vue
                  - react
                  - node
                  - bash
          body:
            type: fields
            label: Description
            fields:
              description:
                type: textarea
                label: README
                size: large
                help: "Rendered as the default tab on the project page."
                buttons:
                  - headlines
                  - bold
                  - italic
                  - link
                  - bulletList
                  - orderedList
                  - code
          stack_section:
            type: fields
            label: Stack
            fields:
              stack:
                type: structure
                label: Stack
                layout: table
                help: "Tech stack table — appears under the 'stack' tab on the project page."
                fields:
                  name:
                    type: text
                    label: Name
                    width: 1/3
                  version:
                    type: text
                    label: Version
                    width: 1/3
                  note:
                    type: text
                    label: Note
                    width: 1/3
          decisions_section:
            type: fields
            label: Decisions
            fields:
              decisions:
                type: textarea
                label: Decisions
                size: medium
                help: "Optional — design / architecture decisions you made on this project."
                buttons:
                  - headlines
                  - bold
                  - italic
                  - link
                  - bulletList
                  - orderedList
                  - code
          retro_section:
            type: fields
            label: Retro
            fields:
              retro:
                type: textarea
                label: Retro
                size: medium
                help: "Optional — what worked, what didn't, what you'd do differently."
                buttons:
                  - headlines
                  - bold
                  - italic
                  - link
                  - bulletList
                  - orderedList
                  - code
          testimonial:
            type: fields
            label: Testimonial
            fields:
              testimonial_quote:
                type: textarea
                label: Quote
                size: small
                buttons: false
              testimonial_name:
                type: text
                label: Name
                width: 1/2
              testimonial_role:
                type: text
                label: Role
                width: 1/2

          info_cards_section:
            type: fields
            label: Info Cards
            fields:
              info_cards:
                type: structure
                label: Info Cards
                layout: table
                help: "Up to ~3 mini cards shown beside the description (e.g. CONTENT MODEL · PERF BUDGET · A11Y)."
                fields:
                  label:
                    type: text
                    label: Label
                    width: 1/3
                  value:
                    type: textarea
                    label: Value
                    width: 2/3
                    buttons: false

      sidebar:
        width: 1/3
        sections:
          actions:
            type: fields
            label: Action Buttons
            fields:
              visit_url:
                type: url
                label: Visit Site URL
                help: "Primary action — renders as the dark 'visit site →' button."
              repo_url:
                type: url
                label: Repo URL
                help: "Renders as the secondary 'repo' button."
          links:
            type: fields
            label: Additional Links
            fields:
              urls:
                type: structure
                label: Extra Links
                help: "Other links — demos, docs, related write-ups. Shown in the body."
                fields:
                  label:
                    type: text
                    label: Label
                  url:
                    type: url
                    label: URL
          gallery:
            type: files
            label: Screenshots
            template: image

  seo:
    extends: tabs/seo
