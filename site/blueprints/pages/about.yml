title: About
icon: user

tabs:
  content:
    label: Content
    icon: text
    columns:
      main:
        width: 2/3
        sections:
          hero:
            type: fields
            label: Hero
            fields:
              show_hero:
                type: toggle
                label: Show Hero Section
                default: true
              heading:
                type: text
                label: Heading
                when:
                  show_hero: true
              intro:
                type: textarea
                label: Introduction
                size: small
                when:
                  show_hero: true
              profile_image:
                label: Profile Image
                type: files
                max: 1
                layout: cards
                query: page.images
                when:
                  show_hero: true
          story:
            type: fields
            label: Story
            fields:
              story_blocks:
                type: blocks
                label: Story
                fieldsets:
                  - text
                  - image
                  - quote
                  - heading
          passions:
            type: fields
            label: Passions
            fields:
              show_passions:
                type: toggle
                label: Show Passions Section
                default: true
              passions_text:
                type: textarea
                label: Passions
                size: medium
                when:
                  show_passions: true
      sidebar:
        width: 1/3
        sections:
          skills:
            type: fields
            label: Skills
            fields:
              show_skills:
                type: toggle
                label: Show Skills Section
                default: true
              skills:
                type: structure
                label: Skills Matrix
                layout: table
                when:
                  show_skills: true
                fields:
                  name:
                    type: text
                    label: Skill
                  level:
                    type: range
                    label: Level
                    min: 0
                    max: 100
                    step: 5

  identity:
    label: Identity
    icon: user
    columns:
      left:
        width: 1/2
        sections:
          who:
            type: fields
            label: Who
            fields:
              display_name:
                type: text
                label: Name
              role:
                type: text
                label: Role
              role_since:
                type: text
                label: Role Since
                help: "e.g. 2021"
              location:
                type: text
                label: Location
              timezone:
                type: text
                label: Timezone
                help: "IANA format e.g. Europe/Amsterdam — the frontend converts this to the visitor's local time"
              availability:
                type: select
                label: Availability
                options:
                  available: Available
                  busy: Busy
                  open_to_offers: Open to Offers
      right:
        width: 1/2
        sections:
          now:
            type: fields
            label: Now
            fields:
              currently_working_on:
                type: text
                label: Currently Working On
              journey:
                type: textarea
                label: My Journey
                size: large
              open_to:
                type: tags
                label: Open To
                options:
                  - Freelance
                  - Full-time
                  - Consulting
                  - Side Projects
          bio_facts_section:
            type: fields
            label: Bio Facts
            fields:
              bio_facts:
                type: structure
                label: Bio Facts
                layout: table
                help: "Short label/value pairs shown in the identity card grid (e.g. focus, langs, tools, vibe, outside, coffee). Labels appear above values in a mono UPPERCASE style."
                fields:
                  label:
                    type: text
                    label: Label
                    width: 1/3
                  value:
                    type: text
                    label: Value
                    width: 2/3

  seo:
    extends: tabs/seo
