name: Update BUILD.json

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Write BUILD.json
        env:
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          RUN: ${{ github.run_number }}
        run: |
          TIMESTAMP=$(git log -1 --format=%ct "$SHA")
          SHORT=${SHA:0:7}
          VERSION="v0.1.${RUN}"

          cat > BUILD.json <<EOF
          {
            "sha": "${SHA}",
            "short": "${SHORT}",
            "branch": "${BRANCH}",
            "run": ${RUN},
            "version": "${VERSION}",
            "timestamp": ${TIMESTAMP}
          }
          EOF
          echo "Generated BUILD.json:"
          cat BUILD.json

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BUILD.json
          if git diff --staged --quiet; then
            echo "No changes to BUILD.json — skipping commit."
          else
            git commit -m "chore: update BUILD.json [skip ci]"
            git push
          fi
